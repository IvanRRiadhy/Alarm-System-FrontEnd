version: '3.8'

services:
  alarm-frontend:
    container_name: alarm-system-frontend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3500:3500"
    environment:
      # Pass your GitHub Personal Access Token (PAT) if the repository is private.
      # This allows the container to run git fetch and git pull without prompting for credentials.
      - GIT_TOKEN
    volumes:
      # We bind mount only the .git folder so that the container can read and write git history
      # (e.g. run git fetch, git status, and git pull) without binding the entire workspace.
      # This prevents host-container node_modules conflicts (especially when running on Windows).
      - ./.git:/app/.git
      # Uncomment this line if you want to change runtime config (API/MQTT URLs) on the host
      # and have it apply immediately on page refresh without rebuilding the container:
      # - ./public/config.json:/app/dist/config.json
    restart: unless-stopped
